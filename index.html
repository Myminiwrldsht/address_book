<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Address Book app — store and manage your contacts">
  <title>Address Book</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="header">
    <h1>Address Book</h1>
    <p>Store and manage your contacts</p>
    <nav>
      <a href="index.html">Address Book</a>
      <a href="places.html">Places You've Been</a>
    </nav>
  </div>

  <main>
    <section class="form-section">
      <h2>Add a Contact</h2>
      <form id="contactForm">
        <label for="firstName">First Name:</label>
        <input type="text" id="firstName" placeholder="e.g Jane" required><br><br>

        <label for="lastName">Last Name:</label>
        <input type="text" id="lastName" placeholder="e.g Doe" required><br><br>

        <label for="address">Address:</label>
        <input type="text" id="address" placeholder="e.g 123 Main St" required><br><br>

        <label for="phone">Phone:</label>
        <input type="tel" id="phone" placeholder="e.g (123) 456-7890" required><br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" placeholder="e.g jane.doe@example.com" required><br><br>

        <button type="submit">Add Contact</button>
      </form>
    </section>

    <section class="list-section">
      <h2>Contacts</h2>
      <div id="contactList"></div>
    </section>

    <section class="detail-section" id="contactDetail" style="display:none;">
      <h2>Contact Details</h2>
      <div id="detailContent"></div>
      <button id="deleteContact">Delete Contact</button>
      <button id="backButton">Back</button>
    </section>
  </main>

  <div class="footer">
    <p>&copy; 2025 Lakeisha Maya. All rights reserved.</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
